{% extends 'articles/base.html' %}

{% block title %}{{ article.title }}{% endblock %}

{% block content %}
    <article>
        <h1>{{ article.title }}</h1>
        <p class="meta">
            Опубліковано: {{ article.published_date|date:"d.m.Y H:i" }} |
            Автор: <a href="{% url 'articles_by_author' article.author.id %}">{{ article.author.username }}</a>
        </p>
        <div class="text">
            {{ article.text|linebreaks }}
        </div>
    </article>
    <p><a href="{% url 'article_list' %}">&larr; Назад до списку</a></p>
{% endblock %}
